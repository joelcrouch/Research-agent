[build-systems]
requires = ["setuptools>=68", "wheel"]
build-backend="setuptools.backends.legacy:build"

[project]
name="research-agent"
version="0.1.0"
description="Academic Reseach Intelligence Agent"
requires-python = ">=3.11"
dependencies= [
    "langgraph>=0.2.0",
    "langchain-core>=0.3.0",
    "langchain-anthropic>=0.2.0",
    "pydantic>=2.7.0",
    "pydantic-settings>=2.3.0",
    "python-dotenv>=1.0.0",
    "structlog>=24.1.0",
    "rich>=13.7.0",
    "httpx>=0.27.0",
    "arxiv>=2.1.0",
]

dev= [
    "pytest>="0.2.0",
    "pytest-asyncio>=0.23.0",
    "pytest-mock>=3.14.0",
    "ruff>=0.4.0",
    "mypy>=1.10.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["agent*", "config*", "schemas*", "eval*"]

# ── Ruff (linter + formatter) ──────────────────────────────────────────────────
[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]   # long lines — handled by formatter

# ── Mypy ──────────────────────────────────────────────────────────────────────
[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true   # third-party stubs may be absent

# ── Pytest ────────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
    "integration: real network calls — skipped in CI (deselect with -m 'not integration')",
]
testpaths = ["tests"]
